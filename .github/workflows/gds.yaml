name: gds

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: build gds
        uses: TinyTapeout/tt-gds-action@ttsky26a
        with:
          clock_period: "20.0" # 50 MHz
          json_path: "info.yaml"

  viewer:
    needs: gds
    runs-on: ubuntu-latest
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttsky26a
