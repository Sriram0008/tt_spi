name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v3

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog python3-pip
          pip3 install cocotb pytest

      - name: run tests
        run: |
          cd test
          make
